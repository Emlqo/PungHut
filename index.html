<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe-hoot Pro | 진짜 실전용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap');
    body { font-family: 'Nanum+Gothic', sans-serif; }
    .title-font { font-family: 'Black Han Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Firebase 초기화 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDVk0xKbUykia3dpmP0PMMxoVExRgPOo-o",
      authDomain: "test-dafb1.firebaseapp.com",
      databaseURL: "https://test-dafb1.firebaseio.com",
      projectId: "test-dafb1",
      storageBucket: "test-dafb1.firebasestorage.app",
      messagingSenderId: "842762232815",
      appId: "1:842762232815:web:a4bcfac346712ef2250c1a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const ADMIN_PASSWORD = "vnddidwnd";

    function App() {
      const [view, setView] = useState('home'); // home, admin_auth, admin_dash, game_host, student
      const [activeClassCode, setActiveClassCode] = useState(null); // 관리자가 선택한 클래스
      
      return (
        <div className="min-h-screen">
          {view === 'home' && <HomeView onSelect={setView} />}
          {view === 'admin_auth' && <AdminAuth onSuccess={() => setView('admin_dash')} />}
          {view === 'admin_dash' && (
            <AdminDashboard 
              onEnterClass={(code) => {
                setActiveClassCode(code);
                setView('game_host');
              }} 
            />
          )}
          {view === 'game_host' && <GameHostView roomCode={activeClassCode} onBack={() => setView('admin_dash')} />}
          {view === 'student' && <StudentView onBack={() => setView('home')} />}
        </div>
      );
    }

    // ==========================================
    // 1. 메인 화면
    // ==========================================
    function HomeView({ onSelect }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-700 text-white p-6">
          <h1 className="text-6xl title-font mb-4 drop-shadow-2xl">Vibe-hoot! 🚀</h1>
          <p className="text-xl mb-12 font-bold opacity-80">선생님과 함께하는 실시간 퀴즈</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            <button onClick={() => onSelect('student')} className="p-8 bg-amber-400 text-amber-900 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition transform">학생 입장하기</button>
            <button onClick={() => onSelect('admin_auth')} className="p-8 bg-white text-indigo-700 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition transform">선생님 관리도구</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 관리자 인증
    // ==========================================
    function AdminAuth({ onSuccess }) {
      const [pw, setPw] = useState('');
      const handleLogin = () => {
        if (pw === ADMIN_PASSWORD) onSuccess();
        else alert('비밀번호가 틀렸습니다.');
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-slate-800 p-6">
          <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h2 className="text-3xl font-black mb-6 text-center text-slate-800">선생님 로그인</h2>
            <input 
              type="password" value={pw} 
              onChange={e=>setPw(e.target.value)} 
              onKeyDown={e=>e.key==='Enter'&&handleLogin()} 
              className="w-full p-4 border-4 rounded-xl mb-6 text-center text-xl outline-none focus:border-indigo-500" 
              placeholder="비밀번호 입력" 
            />
            <button onClick={handleLogin} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-xl hover:bg-indigo-700">입장</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 관리자 대시보드 (문제 & 방 관리)
    // ==========================================
    function AdminDashboard({ onEnterClass }) {
      const [quizzes, setQuizzes] = useState([]);
      const [classes, setClasses] = useState({});
      const [newQ, setNewQ] = useState({ question: '', options: ['', '', '', ''], answerIndex: 0 });

      useEffect(() => {
        db.ref('quiz_pool').on('value', snap => {
          const data = snap.val();
          if(data) setQuizzes(Object.entries(data).map(([id, val]) => ({id, ...val})));
        });
        db.ref('classes').on('value', snap => {
          setClasses(snap.val() || {});
        });
      }, []);

      const saveQuestion = () => {
        if(!newQ.question || newQ.options.includes('')) return alert('문제와 4개의 보기를 모두 입력하세요.');
        db.ref('quiz_pool').push(newQ);
        setNewQ({ question: '', options: ['', '', '', ''], answerIndex: 0 });
      };

      const deleteQuestion = (id) => {
        if(confirm('이 문제를 삭제하시겠습니까?')) db.ref('quiz_pool/' + id).remove();
      };

      const createClass = () => {
        if(quizzes.length === 0) return alert('저장소에 문제가 하나도 없습니다! 먼저 문제를 만드세요.');
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        
        // 클래스 생성 시 현재 quiz_pool을 복사해서 저장 (박제)
        db.ref('classes/' + code).set({
          createdAt: Date.now(),
          state: 'waiting',
          isLocked: false, // 문 열림 상태
          currentIdx: 0,
          quizList: quizzes,
          players: {}
        }).then(() => {
          alert(`새 클래스 [${code}] 방이 생성되었습니다.`);
        });
      };

      const deleteClass = (code) => {
        if(confirm('이 클래스를 완전히 삭제하시겠습니까?')) db.ref('classes/' + code).remove();
      };

      return (
        <div className="p-8 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
          {/* 왼쪽: 클래스(방) 관리 */}
          <div>
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-3xl font-black text-indigo-700">개설된 클래스 관리</h2>
              <button onClick={createClass} className="px-6 py-2 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600 shadow">+ 새 방 만들기</button>
            </div>
            <div className="space-y-4">
              {Object.keys(classes).length === 0 && <div className="text-gray-500">개설된 방이 없습니다.</div>}
              {Object.entries(classes).map(([code, data]) => (
                <div key={code} className="bg-white p-6 rounded-2xl shadow-md flex justify-between items-center border-l-8 border-indigo-500">
                  <div>
                    <h3 className="text-3xl font-black text-slate-800">{code}</h3>
                    <p className="text-sm text-gray-500">상태: {data.state === 'waiting' ? '대기중' : data.state === 'final' ? '종료됨' : '진행중'} | 잠금: {data.isLocked ? '🔒 마감됨' : '🔓 열림'}</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => onEnterClass(code)} className="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700">입장/관리</button>
                    <button onClick={() => deleteClass(code)} className="px-4 py-3 bg-red-100 text-red-600 font-bold rounded-xl hover:bg-red-200">삭제</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 오른쪽: 문제 은행 관리 */}
          <div>
            <h2 className="text-3xl font-black text-amber-600 mb-6">문제 은행 저장소</h2>
            <div className="bg-white p-6 rounded-2xl shadow-md mb-8">
              <input type="text" placeholder="질문을 입력하세요" className="w-full p-3 border-2 rounded-lg mb-4 font-bold" value={newQ.question} onChange={e=>setNewQ({...newQ, question:e.target.value})} />
              <div className="grid grid-cols-1 gap-2 mb-4">
                {newQ.options.map((opt, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input type="radio" name="ans" checked={newQ.answerIndex === i} onChange={()=>setNewQ({...newQ, answerIndex:i})} className="w-5 h-5 accent-amber-500" />
                    <input type="text" placeholder={`선택지 ${i+1}`} className="flex-1 p-2 border rounded" value={opt} onChange={e=>{
                      const copy = [...newQ.options];
                      copy[i] = e.target.value;
                      setNewQ({...newQ, options: copy});
                    }} />
                  </div>
                ))}
              </div>
              <button onClick={saveQuestion} className="w-full py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600">문제 저장하기</button>
            </div>

            <div className="space-y-3">
              {quizzes.map(q => (
                <div key={q.id} className="bg-slate-100 p-4 rounded-xl flex justify-between items-center">
                  <div className="flex-1 pr-4">
                    <p className="font-bold text-lg">{q.question}</p>
                    <p className="text-sm text-green-600 mt-1">정답: {q.options[q.answerIndex]}</p>
                  </div>
                  <button onClick={()=>deleteQuestion(q.id)} className="text-red-500 font-bold bg-white px-3 py-1 rounded shadow-sm">삭제</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. 게임 호스트 (선생님 진행 화면)
    // ==========================================
    function GameHostView({ roomCode, onBack }) {
      const [roomData, setRoomData] = useState(null);
      const [timeLeft, setTimeLeft] = useState(30);

      useEffect(() => {
        const ref = db.ref('classes/' + roomCode);
        ref.on('value', snap => setRoomData(snap.val()));
        return () => ref.off();
      }, [roomCode]);

      useEffect(() => {
        let timer;
        if (roomData && roomData.state === 'question' && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (roomData && roomData.state === 'question' && timeLeft === 0) {
          showResult();
        }
        return () => clearInterval(timer);
      }, [roomData ? roomData.state : null, timeLeft]);

      if(!roomData) return <div className="p-20 text-center text-2xl font-bold">방 정보를 불러오는 중...</div>;

      const toggleLock = () => {
        db.ref('classes/' + roomCode).update({ isLocked: !roomData.isLocked });
      };

      const startGame = () => {
        db.ref('classes/' + roomCode).update({ state: 'question', startTime: Date.now(), isLocked: true });
      };

      const showResult = () => {
        const currentQ = roomData.quizList[roomData.currentIdx];
        const updates = {};
        updates['classes/' + roomCode + '/state'] = 'result';
        
        if(roomData.players) {
          Object.entries(roomData.players).forEach(([name, p]) => {
            if (p.answer === currentQ.answerIndex && p.answerTime) {
              const timeTaken = (p.answerTime - p.questionStartTime) / 1000;
              const scoreAdd = Math.max(0, Math.round((1 - timeTaken / 30) * 1000));
              updates['classes/' + roomCode + '/players/' + name + '/score'] = (p.score || 0) + scoreAdd;
            }
            updates['classes/' + roomCode + '/players/' + name + '/answer'] = null; // 초기화
          });
        }
        db.ref().update(updates);
      };

      const nextQuestion = () => {
        if(roomData.currentIdx + 1 < roomData.quizList.length) {
          const next = roomData.currentIdx + 1;
          setTimeLeft(30);
          db.ref('classes/' + roomCode).update({ state: 'question', currentIdx: next, startTime: Date.now() });
        } else {
          db.ref('classes/' + roomCode).update({ state: 'final' });
        }
      };

      const playersList = roomData.players ? Object.keys(roomData.players) : [];

      return (
        <div className="p-8 text-center min-h-screen bg-indigo-50 relative">
          <button onClick={onBack} className="absolute top-8 left-8 px-4 py-2 bg-slate-300 rounded font-bold">← 대시보드로</button>
          
          {roomData.state === 'waiting' && (
            <div className="mt-10">
              <h2 className="text-4xl mb-6 font-bold">학생들에게 아래 코드를 공유하세요!</h2>
              <div className="text-9xl title-font text-indigo-600 mb-6 drop-shadow-lg">{roomCode}</div>
              
              <div className="mb-10">
                <button onClick={toggleLock} className={`px-8 py-4 rounded-full text-2xl font-bold shadow-lg transition ${roomData.isLocked ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`}>
                  {roomData.isLocked ? '🔒 현재 입장 마감됨 (문 닫힘)' : '🔓 입장 허용 중 (클릭 시 마감)'}
                </button>
              </div>

              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-4xl mx-auto">
                <h3 className="text-2xl font-bold mb-6">현재 접속 인원: {playersList.length}명</h3>
                <div className="flex flex-wrap gap-4 justify-center min-h-[100px]">
                  {playersList.length === 0 && <span className="text-gray-400">학생을 기다리는 중...</span>}
                  {playersList.map(name => <span key={name} className="px-6 py-3 bg-indigo-100 rounded-full font-bold text-xl text-indigo-800">{name}</span>)}
                </div>
                <button onClick={startGame} className="mt-12 px-20 py-6 bg-amber-500 text-white rounded-2xl text-4xl font-black shadow-lg hover:bg-amber-600 transition transform hover:scale-105">게임 시작하기!</button>
              </div>
            </div>
          )}

          {roomData.state === 'question' && (
            <div className="max-w-5xl mx-auto mt-10">
              <div className="flex justify-between items-center mb-8">
                <span className="text-5xl font-black text-red-500 bg-white px-8 py-4 rounded-full shadow-lg border-4 border-red-200">{timeLeft}초</span>
                <span className="text-3xl font-bold bg-indigo-200 px-6 py-2 rounded-full text-indigo-800">문제 {roomData.currentIdx + 1} / {roomData.quizList.length}</span>
              </div>
              <h2 className="text-5xl font-black bg-white p-12 rounded-3xl shadow-xl mb-10 leading-tight">{roomData.quizList[roomData.currentIdx].question}</h2>
              <div className="grid grid-cols-2 gap-6 h-80">
                {roomData.quizList[roomData.currentIdx].options.map((opt, i) => (
                  <div key={i} className={`flex items-center justify-center text-4xl font-bold text-white rounded-2xl shadow-xl ${['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'][i]}`}>
                    {opt}
                  </div>
                ))}
              </div>
              <button onClick={showResult} className="mt-8 px-6 py-2 bg-slate-800 text-white rounded font-bold">시간 건너뛰기</button>
            </div>
          )}

          {roomData.state === 'result' && (
            <div className="mt-20">
              <h2 className="text-4xl font-bold mb-6 text-slate-600">정답은?</h2>
              <div className="text-7xl font-black text-indigo-600 mb-16 bg-white inline-block px-12 py-6 rounded-3xl shadow-xl border-4 border-indigo-200">
                {roomData.quizList[roomData.currentIdx].options[roomData.quizList[roomData.currentIdx].answerIndex]}
              </div>
              <div>
                <button onClick={nextQuestion} className="px-16 py-6 bg-indigo-600 text-white rounded-full text-3xl font-bold shadow-2xl hover:bg-indigo-700 transition transform hover:scale-105">
                  {roomData.currentIdx + 1 < roomData.quizList.length ? '다음 문제로 넘어갈까요?' : '최종 결과 확인하기 🏆'}
                </button>
              </div>
            </div>
          )}

          {roomData.state === 'final' && (
            <div className="max-w-3xl mx-auto mt-16">
              <h2 className="text-7xl title-font text-amber-500 mb-16 drop-shadow-xl">🏆 명예의 전당 🏆</h2>
              <div className="space-y-6">
                {playersList.length > 0 ? (
                  Object.entries(roomData.players)
                    .sort((a,b)=> (b[1].score||0) - (a[1].score||0))
                    .slice(0,5) // 상위 5명
                    .map(([name, p], i) => (
                      <div key={name} className={`flex justify-between items-center p-8 rounded-3xl text-4xl font-black shadow-xl ${i===0?'bg-amber-300 text-amber-900 transform scale-110 border-4 border-amber-400 z-10':i===1?'bg-slate-300 text-slate-800':i===2?'bg-orange-300 text-orange-900':'bg-white text-slate-700'}`}>
                        <span>{i+1}위. {name}</span>
                        <span>{p.score || 0} 점</span>
                      </div>
                    ))
                ) : (
                  <div className="text-3xl font-bold text-gray-500">참여한 학생이 없습니다.</div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. 학생용 (리모컨)
    // ==========================================
    function StudentView({ onBack }) {
      const [roomCode, setRoomCode] = useState('');
      const [name, setName] = useState('');
      const [isJoined, setIsJoined] = useState(false);
      const [gameData, setGameData] = useState({ state: 'waiting' });
      const [hasAnswered, setHasAnswered] = useState(false);

      const join = () => {
        if(!roomCode || !name) return alert('클래스 코드와 이름을 모두 입력해주세요.');
        
        // 1. 방이 존재하는지, 닫혀있는지 먼저 확인
        db.ref('classes/' + roomCode).once('value').then(snap => {
          const data = snap.val();
          if(!data) {
            alert('존재하지 않는 번호입니다. 선생님께 코드를 다시 확인하세요!');
            return;
          }
          if(data.isLocked) {
            alert('❌ 이미 입장이 마감된 클래스입니다. 선생님께 문을 열어달라고 요청하세요.');
            return;
          }

          // 2. 입장 성공 처리
          db.ref('classes/' + roomCode + '/players/' + name).set({ score: 0, answer: null }).then(() => {
            setIsJoined(true);
            // 실시간 상태 리스너 부착
            db.ref('classes/' + roomCode).on('value', snap2 => {
              const liveData = snap2.val();
              if(liveData) setGameData(liveData);
            });
          }).catch(err => {
            alert('서버 연결 문제로 입장하지 못했습니다.');
          });
        });
      };

      const sendAnswer = (idx) => {
        if(hasAnswered) return;
        setHasAnswered(true);
        db.ref('classes/' + roomCode + '/players/' + name).update({
          answer: idx,
          answerTime: Date.now(),
          questionStartTime: gameData.startTime
        });
      };

      useEffect(() => {
        if(gameData.state === 'question') setHasAnswered(false);
      }, [gameData.state, gameData.currentIdx]);

      if(!isJoined) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-amber-400 p-6 relative">
            <button onClick={onBack} className="absolute top-8 left-8 px-4 py-2 bg-amber-500 text-amber-900 rounded-lg font-bold shadow">← 뒤로가기</button>
            <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-sm">
              <h2 className="text-4xl font-black text-center mb-10 text-slate-800">게임 입장하기</h2>
              <input type="text" placeholder="선생님이 알려준 4자리 코드" maxLength="4" className="w-full p-5 border-4 border-slate-200 rounded-2xl mb-4 text-center text-xl font-bold focus:border-amber-400 outline-none" value={roomCode} onChange={e=>setRoomCode(e.target.value)} />
              <input type="text" placeholder="학번 + 이름 (예: 10701 김철수)" className="w-full p-5 border-4 border-slate-200 rounded-2xl mb-10 text-center text-xl font-bold focus:border-amber-400 outline-none" value={name} onChange={e=>setName(e.target.value)} />
              <button onClick={join} className="w-full py-6 bg-indigo-600 text-white rounded-2xl font-black text-3xl shadow-[0_8px_0_rgb(67,56,202)] active:translate-y-2 active:shadow-none transition-all">도전!</button>
            </div>
          </div>
        );
      }

      // 점수 안전하게 불러오기
      const currentScore = gameData.players && gameData.players[name] ? gameData.players[name].score : 0;

      return (
        <div className="p-4 min-h-screen flex flex-col bg-slate-100 text-center">
          <div className="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border-b-4 border-slate-200">
            <span className="font-black text-xl text-slate-700">👤 {name}</span>
            <span className="font-black text-2xl text-amber-500">⭐ {currentScore} pt</span>
          </div>

          {gameData.state === 'waiting' && (
            <div className="flex-1 flex flex-col items-center justify-center">
              <div className="w-24 h-24 border-8 border-indigo-500 border-t-transparent rounded-full animate-spin mb-8"></div>
              <div className="text-3xl font-black text-slate-500 leading-relaxed">준비 완료!<br/>선생님이 게임을 시작할 때까지<br/>화면을 보며 대기하세요.</div>
            </div>
          )}
          
          {gameData.state === 'question' && (
            <div className="flex-1 flex flex-col gap-4">
              {hasAnswered ? (
                <div className="flex-1 flex flex-col items-center justify-center bg-slate-200 rounded-3xl">
                  <div className="text-6xl mb-4">👍</div>
                  <div className="text-3xl font-black text-slate-600">제출 완료!<br/>앞 화면을 보세요.</div>
                </div>
              ) : (
                ['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'].map((color, i) => (
                  <button key={i} onClick={()=>sendAnswer(i)} className={`flex-1 rounded-[2rem] shadow-[0_10px_0_rgba(0,0,0,0.2)] active:translate-y-2 active:shadow-none transition-all ${color}`}></button>
                ))
              )}
            </div>
          )}

          {gameData.state === 'result' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-indigo-100 rounded-3xl">
              <div className="text-8xl mb-6">👀</div>
              <div className="text-4xl font-black text-indigo-700">앞 화면에서<br/>정답을 확인하세요!</div>
            </div>
          )}
          
          {gameData.state === 'final' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-amber-100 rounded-3xl">
              <div className="text-8xl mb-6">🎉</div>
              <div className="text-5xl font-black text-amber-600 mb-4">게임 종료!</div>
              <div className="text-2xl font-bold text-slate-600">내 최종 점수: {currentScore}점</div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
