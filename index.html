            { question: '영어 알파벳은 총 24자이다.', answer: 'X', explanation: '영어 알파벳은 A부터 Z까지 총 26자입니다.' },
            { question: '식물학적으로 우리가 먹는 고구마는 식물의 \'뿌리\'이고, 감자는 식물의 \'줄기\'이다.', answer: 'O', explanation: '고구마는 덩이뿌리, 감자는 덩이줄기가 발달한 형태입니다.' },

            { question: '바나나가 열리는 식물은 식물학적으로 \'나무\'가 아니라 \'풀\'이다.', answer: 'O', explanation: '나무처럼 보이지만 단단한 목질부가 없는 여러해살이 풀입니다.' },
            { question: '순우리말 \'시나브로\'는 \'모르는 사이에 조금씩\'이라는 뜻이다.', answer: 'O', explanation: '조금씩 조금씩 변해가는 모양을 뜻하는 순우리말입니다.' },
            { question: '달에도 지구처럼 사람이 숨 쉴 수 있는 공기가 존재한다.', answer: 'X', explanation: '달에는 대기(공기)가 거의 존재하지 않습니다.' },
            { question: '사우디아라비아에는 일 년 내내 물이 흐르는 강이 단 한 개도 없다.', answer: 'O', explanation: '국토 전체에 영구적인 강이나 호수가 없는 세계에서 가장 큰 나라입니다.' },

            { question: '순수한 물은 1기압에서 섭씨 0도에 끓는다.', answer: 'X', explanation: '물은 0도에서 얼고, 100도에서 끓습니다.' },

            { question: '거북선은 이순신 장군이 최초로 만들어낸 발명품이다.', answer: 'X', explanation: '조선 태종 때 이미 거북선(귀선) 기록이 있으며, 이순신 장군은 이를 개량한 것입니다.' },
            { question: '독도는 대한민국 최동단에 위치한 섬이다.', answer: 'O', explanation: '우리나라 가장 동쪽에 있는 자랑스러운 영토입니다.' }

        // ------------------ 컴포넌트 영역 ------------------

        // 1. 초성 퀴즈 컴포넌트
        function ChosungQuiz() {
            const [gameState, setGameState] = useState('start');
            const [currentRound, setCurrentRound] = useState(0);
            const [showExamples, setShowExamples] = useState(false);
            const [timeLeft, setTimeLeft] = useState(30);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            useEffect(() => {
                let timer = null;
                if (isTimerRunning && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setIsTimerRunning(false);
                }
                return () => clearInterval(timer);
            }, [isTimerRunning, timeLeft]);

            const startGame = () => {
                setGameState('playing');
                setCurrentRound(0);
                resetRound();
            };

            const resetRound = () => {
                setShowExamples(false);
                setTimeLeft(30);
                setIsTimerRunning(false);
            };

            const nextRound = () => {
                if (currentRound < QUIZ_DATA.length - 1) {
                    setCurrentRound(prev => prev + 1);
                    resetRound();
                } else {
                    setGameState('end');
                }
            };

            const prevRound = () => {
                if (currentRound > 0) {
                    setCurrentRound(prev => prev - 1);
                    resetRound();
                }
            };

            if (gameState === 'start') {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center relative">
                        <div className="text-gold tracking-[0.5em] text-xl font-bold mb-6">풍양중 흑백교사전</div>
                        <h1 className="text-7xl md:text-9xl font-black mb-12 text-gradient-gold glow-effect text-center fade-in">
                            초성 퀴즈
                        </h1>
                        <p className="text-gray-400 text-lg mb-12 fade-in" style={{animationDelay: '0.2s'}}>
                            제시된 초성을 보고 연상되는 단어를 외쳐주세요!
                        </p>
                        <button onClick={startGame} className="px-12 py-4 bg-transparent border-2 border-gold text-gold text-2xl font-bold rounded-full hover:bg-gold hover:text-black transition-all duration-300 fade-in" style={{animationDelay: '0.4s'}}>
                            게임 시작하기
                        </button>
                    </div>
                );
            }

            if (gameState === 'end') {
                return (
                    <div className="h-full w-full flex flex-col items-center justify-center">
                        <h1 className="text-6xl md:text-8xl font-black mb-8 text-gradient-gold glow-effect text-center fade-in">수고하셨습니다!</h1>
                        <p className="text-gray-300 text-2xl mb-12 fade-in">초성 퀴즈가 종료되었습니다.</p>
                        <button onClick={() => setGameState('start')} className="px-8 py-3 bg-gray-800 border border-gray-600 text-white text-lg rounded hover:bg-gray-700 transition-all duration-300 fade-in">
                            처음으로 돌아가기
                        </button>
                    </div>
                );
            }

            const currentData = QUIZ_DATA[currentRound];

            return (
                <div className="h-full w-full flex flex-col items-center justify-center relative p-6">
                    <div className="absolute top-6 w-full flex justify-between items-center px-10 md:px-20">
                        <div className="px-6 py-2 rounded-full border border-gold/40 bg-black/50 text-gold font-bold text-2xl tracking-widest shadow-[0_0_15px_rgba(197,168,105,0.2)]">
                            ROUND {currentRound + 1} <span className="text-gray-500 text-lg ml-2">/ {QUIZ_DATA.length}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className={`text-4xl font-bold font-mono ${timeLeft <= 5 ? 'text-red-500' : 'text-white'}`}>
                                00:{timeLeft < 10 ? `0${timeLeft}` : timeLeft}
                            </div>
                            <button onClick={() => setIsTimerRunning(!isTimerRunning)} className="w-12 h-12 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center text-gold transition border border-gray-600">
                                {isTimerRunning ? '⏸' : '▶'}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center w-full fade-in">
                        <div className="text-[12rem] md:text-[18rem] font-black leading-none text-white tracking-[0.2em] ml-[0.2em] glow-effect drop-shadow-2xl">
                            {currentData.chosung}
                        </div>
                        <div className="h-32 mt-12 flex items-center justify-center">
                            {showExamples ? (
                                <div className="text-gray-300 text-2xl md:text-3xl font-medium tracking-wide text-center leading-relaxed fade-in bg-white/5 px-8 py-4 rounded-xl border border-white/10">
                                    <span className="text-gold mr-3">예시:</span> {currentData.examples}
                                </div>
                            ) : (
                                <button onClick={() => setShowExamples(true)} className="px-6 py-2 text-gray-500 border border-gray-700 rounded hover:bg-gray-800 hover:text-gray-300 transition">
                                    예시 정답 보기 (진행자용)
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="absolute bottom-10 flex gap-6">
                        <button onClick={prevRound} disabled={currentRound === 0} className={`px-8 py-3 rounded text-lg font-bold transition-all ${currentRound === 0 ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-gray-800 text-white hover:bg-gray-700 border border-gray-600'}`}>
                            이전 라운드
                        </button>
                        <button onClick={nextRound} className="px-8 py-3 bg-gold text-black rounded text-lg font-bold hover:bg-gold-light transition-all shadow-[0_0_15px_rgba(197,168,105,0.4)]">
                            {currentRound === QUIZ_DATA.length - 1 ? '결과 보기' : '다음 라운드'}
                        </button>
                    </div>
                </div>
            );
        }

                            처음으로 돌아가기
                        </button>
                    </div>
                );
            }

            const currentData = OX_QUIZ_DATA[currentRound];

            return (
                <div className="h-full w-full flex flex-col items-center justify-center relative p-6">
                    <div className="absolute top-6 w-full flex justify-between items-center px-10 md:px-20">
                        <div className="px-6 py-2 rounded-full border border-gold/40 bg-black/50 text-gold font-bold text-2xl tracking-widest shadow-[0_0_15px_rgba(197,168,105,0.2)]">
                            ROUND {currentRound + 1} <span className="text-gray-500 text-lg ml-2">/ {OX_QUIZ_DATA.length}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className={`text-4xl font-bold font-mono ${timeLeft <= 3 ? 'text-red-500' : 'text-white'}`}>
                                00:{timeLeft < 10 ? `0${timeLeft}` : timeLeft}
                            </div>
                            <button onClick={() => setIsTimerRunning(!isTimerRunning)} className="w-12 h-12 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center text-gold transition border border-gray-600">
                                {isTimerRunning ? '⏸' : '▶'}
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center w-full fade-in w-[90%] md:w-[70%] mx-auto">
                        <div className="text-5xl md:text-7xl font-bold leading-tight text-white tracking-wide text-center glow-effect drop-shadow-2xl mb-12 break-keep">
                            <span className="text-gold mr-4">Q.</span>{currentData.question}
                        </div>

                        <div className="h-64 mt-4 flex items-center justify-center w-full">
                            {showAnswer ? (
                                <div className="flex flex-col items-center fade-in w-full">
                                    <div className={`text-[10rem] md:text-[14rem] font-black leading-none mb-8 ${currentData.answer === 'O' ? 'text-blue-500 drop-shadow-[0_0_40px_rgba(59,130,246,0.6)]' : 'text-red-500 drop-shadow-[0_0_40px_rgba(239,68,68,0.6)]'}`}>
                                        {currentData.answer}
                                    </div>
                                    <div className="text-gray-200 text-xl md:text-2xl font-medium tracking-wide text-center leading-relaxed bg-white/10 px-8 py-5 rounded-xl border border-white/20 w-full max-w-4xl shadow-xl backdrop-blur-sm">
                                        <span className="text-gold font-bold mr-3">해설:</span> {currentData.explanation}
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setShowAnswer(true)} className="px-10 py-5 text-2xl font-bold text-gray-300 border-2 border-gray-600 rounded-full hover:bg-gray-700 hover:text-white hover:border-gray-400 transition-all">
                                    정답 및 해설 보기 (진행자용)
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="absolute bottom-10 flex gap-6">
                        <button onClick={prevRound} disabled={currentRound === 0} className={`px-8 py-3 rounded text-lg font-bold transition-all ${currentRound === 0 ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-gray-800 text-white hover:bg-gray-700 border border-gray-600'}`}>
                            이전 라운드
                        </button>
                        <button onClick={nextRound} className="px-8 py-3 bg-gold text-black rounded text-lg font-bold hover:bg-gold-light transition-all shadow-[0_0_15px_rgba(197,168,105,0.4)]">
                            {currentRound === OX_QUIZ_DATA.length - 1 ? '결과 보기' : '다음 라운드'}
                        </button>
                    </div>
                </div>
            );
        }

        // 3. 메인 앱 (네비게이션 및 라우팅)
        function App() {
            const [activeGame, setActiveGame] = useState('chosung'); // 'chosung' or 'ox'

            return (
                <div className="h-screen w-full flex flex-col bg-bgDark relative overflow-hidden">
                    {/* 상단 네비게이션 */}
                    <div className="absolute top-0 w-full flex justify-center items-center bg-black/60 backdrop-blur-md border-b border-gold/30 text-white py-4 px-6 shadow-lg z-50">
                        <div className="flex space-x-12">
                            <button 
                                onClick={() => setActiveGame('chosung')}
                                className={`text-xl font-bold transition-all duration-300 tracking-wider ${activeGame === 'chosung' ? 'text-gold drop-shadow-[0_0_8px_rgba(197,168,105,0.8)]' : 'text-gray-500 hover:text-gold-light'}`}
                            >
                                초성 퀴즈
                            </button>
                            <button 
                                onClick={() => setActiveGame('ox')}
                                className={`text-xl font-bold transition-all duration-300 tracking-wider ${activeGame === 'ox' ? 'text-gold drop-shadow-[0_0_8px_rgba(197,168,105,0.8)]' : 'text-gray-500 hover:text-gold-light'}`}
                            >
                                O X 퀴즈
                            </button>
                        </div>
                    </div>

                    {/* 게임 콘텐츠 영역 */}
                    <div className="flex-1 w-full pt-16">
                        {activeGame === 'chosung' ? <ChosungQuiz /> : <OXQuiz />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
