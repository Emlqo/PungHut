<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe-hoot Pro | 실시간 퀴즈 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap');
    body { font-family: 'Nanum+Gothic', sans-serif; }
    .title-font { font-family: 'Black Han Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Firebase 초기화 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDVk0xKbUykia3dpmP0PMMxoVExRgPOo-o",
      authDomain: "test-dafb1.firebaseapp.com",
      databaseURL: "https://test-dafb1.firebaseio.com",
      projectId: "test-dafb1",
      storageBucket: "test-dafb1.firebasestorage.app",
      messagingSenderId: "842762232815",
      appId: "1:842762232815:web:a4bcfac346712ef2250c1a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const ADMIN_PASSWORD = "vnddidwnd";

    function App() {
      const [view, setView] = useState('home'); 
      
      return (
        <div className="min-h-screen">
          {view === 'home' && <HomeView onSelect={setView} />}
          {view === 'admin_auth' && <AdminAuth onSuccess={() => setView('admin_dash')} />}
          {view === 'admin_dash' && <AdminDashboard onStartGame={() => setView('game_host')} />}
          {view === 'game_host' && <GameHostView />}
          {view === 'student' && <StudentView />}
        </div>
      );
    }

    // 1. 메인 화면
    function HomeView({ onSelect }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-700 text-white p-6">
          <h1 className="text-6xl title-font mb-12 drop-shadow-2xl">Vibe-hoot! 🚀</h1>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            <button onClick={() => onSelect('student')} className="p-8 bg-amber-400 text-amber-900 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition">학생 입장하기</button>
            <button onClick={() => onSelect('admin_auth')} className="p-8 bg-white text-indigo-700 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition">선생님 관리도구</button>
          </div>
        </div>
      );
    }

    // 2. 관리자 인증
    function AdminAuth({ onSuccess }) {
      const [pw, setPw] = useState('');
      const handleLogin = () => {
        if (pw === ADMIN_PASSWORD) onSuccess();
        else alert('비밀번호가 틀렸습니다.');
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-slate-800 p-6">
          <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 className="text-2xl font-bold mb-6 text-center">관리자 로그인</h2>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} className="w-full p-4 border-2 rounded-xl mb-4 text-center text-xl" placeholder="비밀번호 입력" />
            <button onClick={handleLogin} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg">입장</button>
          </div>
        </div>
      );
    }

    // 3. 관리자 대시보드 (퀴즈 생성/관리)
    function AdminDashboard({ onStartGame }) {
      const [quizzes, setQuizzes] = useState([]);
      const [newQ, setNewQ] = useState({ question: '', image: '', options: ['', '', '', ''], answerIndex: 0 });

      useEffect(() => {
        db.ref('quiz_pool').on('value', snap => {
          const data = snap.val();
          if(data) setQuizzes(Object.entries(data).map(([id, val]) => ({id, ...val})));
        });
      }, []);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setNewQ({...newQ, image: reader.result});
          reader.readAsDataURL(file);
        }
      };

      const saveQuestion = () => {
        if(!newQ.question) return alert('문제를 입력하세요');
        db.ref('quiz_pool').push(newQ);
        setNewQ({ question: '', image: '', options: ['', '', '', ''], answerIndex: 0 });
      };

      const deleteQuestion = (id) => db.ref(`quiz_pool/${id}`).remove();

      return (
        <div className="p-8 max-w-4xl mx-auto">
          <div className="flex justify-between items-end mb-8 border-b pb-4">
            <h2 className="text-4xl title-font text-indigo-700">문제 관리 저장소</h2>
            <button onClick={onStartGame} className="px-8 py-3 bg-green-500 text-white rounded-full font-bold text-xl hover:bg-green-600 shadow-lg animate-bounce">게임 세션 만들기</button>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-md mb-10">
            <h3 className="text-xl font-bold mb-4">새 문제 추가</h3>
            <input type="text" placeholder="질문을 입력하세요" className="w-full p-3 border-2 rounded-lg mb-4" value={newQ.question} onChange={e=>setNewQ({...newQ, question:e.target.value})} />
            
            <div className="grid grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-sm font-bold mb-1">사진 업로드</label>
                <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full p-2 border rounded" />
                {newQ.image && <img src={newQ.image} className="mt-2 h-32 rounded object-cover" />}
              </div>
              <div className="space-y-2">
                {newQ.options.map((opt, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input type="radio" name="ans" checked={newQ.answerIndex === i} onChange={()=>setNewQ({...newQ, answerIndex:i})} />
                    <input type="text" placeholder={`선택지 ${i+1}`} className="flex-1 p-2 border rounded" value={opt} onChange={e=>{
                      const copy = [...newQ.options];
                      copy[i] = e.target.value;
                      setNewQ({...newQ, options: copy});
                    }} />
                  </div>
                ))}
              </div>
            </div>
            <button onClick={saveQuestion} className="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold">저장소에 추가</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {quizzes.map(q => (
              <div key={q.id} className="bg-slate-100 p-4 rounded-xl flex justify-between items-start">
                <div>
                  <p className="font-bold">{q.question}</p>
                  <p className="text-sm text-green-600">정답: {q.options[q.answerIndex]}</p>
                </div>
                <button onClick={()=>deleteQuestion(q.id)} className="text-red-500 font-bold">삭제</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // 4. 실제 게임 진행 (Host)
    function GameHostView() {
      const [roomCode, setRoomCode] = useState(null);
      const [gameState, setGameState] = useState('waiting');
      const [players, setPlayers] = useState({});
      const [quizPool, setQuizPool] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [timeLeft, setTimeLeft] = useState(30);

      useEffect(() => {
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        setRoomCode(code);
        
        db.ref('quiz_pool').once('value', snap => {
          const data = snap.val();
          if(data) {
            const list = Object.values(data);
            setQuizPool(list);
            db.ref(`rooms/${code}`).set({ state:'waiting', quizList: list, currentIdx: 0 });
          } else {
            alert('출제된 문제가 없습니다! 저장소에서 문제를 먼저 만드세요.');
            window.location.reload();
          }
        });

        db.ref(`rooms/${code}/players`).on('value', snap => setPlayers(snap.val() || {}));
        return () => db.ref(`rooms/${code}`).off();
      }, []);

      useEffect(() => {
        let timer;
        if (gameState === 'question' && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (gameState === 'question' && timeLeft === 0) {
          showResult();
        }
        return () => clearInterval(timer);
      }, [gameState, timeLeft]);

      const startGame = () => {
        setGameState('question');
        db.ref(`rooms/${roomCode}`).update({ state: 'question', startTime: Date.now() });
      };

      const showResult = () => {
        setGameState('result');
        db.ref(`rooms/${roomCode}`).update({ state: 'result' });

        const currentQ = quizPool[currentIdx];
        const updates = {};
        Object.entries(players).forEach(([name, p]) => {
          if (p.answer === currentQ.answerIndex) {
            const timeTaken = (p.answerTime - p.questionStartTime) / 1000;
            const score = Math.max(0, Math.round((1 - timeTaken / 30) * 1000));
            updates[`rooms/${roomCode}/players/${name}/score`] = (p.score || 0) + score;
          }
          updates[`rooms/${roomCode}/players/${name}/answer`] = null;
        });
        db.ref().update(updates);
      };

      const nextQuestion = () => {
        if(currentIdx + 1 < quizPool.length) {
          const next = currentIdx + 1;
          setCurrentIdx(next);
          setTimeLeft(30);
          setGameState('question');
          db.ref(`rooms/${roomCode}`).update({ state: 'question', currentIdx: next, startTime: Date.now() });
        } else {
          setGameState('final');
          db.ref(`rooms/${roomCode}`).update({ state: 'final' });
        }
      };

      if(!roomCode) return <div className="p-20 text-center text-2xl">방 생성 중...</div>;

      return (
        <div className="p-8 text-center min-h-screen bg-indigo-50">
          {gameState === 'waiting' && (
            <div>
              <h2 className="text-3xl mb-4 font-bold">친구들아 모여라!</h2>
              <div className="text-9xl title-font text-indigo-600 mb-10">{roomCode}</div>
              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-4xl mx-auto">
                <h3 className="text-xl font-bold mb-4">접속 인원: {Object.keys(players).length}명</h3>
                <div className="flex flex-wrap gap-3 justify-center">
                  {Object.keys(players).map(name => <span key={name} className="px-6 py-2 bg-indigo-100 rounded-full font-bold text-indigo-700 animate-bounce">{name}</span>)}
                </div>
                <button onClick={startGame} className="mt-10 px-16 py-5 bg-green-500 text-white rounded-2xl text-3xl font-black shadow-lg">게임 시작하기!</button>
              </div>
            </div>
          )}

          {gameState === 'question' && (
            <div className="max-w-6xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <span className="text-4xl font-black text-red-500 bg-white px-8 py-2 rounded-full shadow-md">{timeLeft}s</span>
                <span className="text-2xl font-bold">Q {currentIdx + 1} / {quizPool.length}</span>
              </div>
              <h2 className="text-4xl font-bold bg-white p-8 rounded-2xl shadow-md mb-6">{quizPool[currentIdx].question}</h2>
              {quizPool[currentIdx].image && <img src={quizPool[currentIdx].image} className="mx-auto h-64 rounded-xl shadow-lg mb-8 object-contain" />}
              <div className="grid grid-cols-2 gap-4 h-64">
                {quizPool[currentIdx].options.map((opt, i) => (
                  <div key={i} className={`flex items-center justify-center text-3xl font-bold text-white rounded-xl shadow-md ${['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'][i]}`}>
                    {opt}
                  </div>
                ))}
              </div>
            </div>
          )}

          {gameState === 'result' && (
            <div className="mt-20">
              <h2 className="text-5xl font-bold mb-4">정답은?</h2>
              <div className="text-6xl title-font text-indigo-600 mb-12">{quizPool[currentIdx].options[quizPool[currentIdx].answerIndex]}</div>
              <button onClick={nextQuestion} className="px-12 py-5 bg-indigo-600 text-white rounded-2xl text-2xl font-bold shadow-xl">
                {currentIdx + 1 < quizPool.length ? '다음 문제로' : '최종 순위표 보기'}
              </button>
            </div>
          )}

          {gameState === 'final' && (
            <div className="max-w-2xl mx-auto mt-10">
              <h2 className="text-6xl title-font text-amber-500 mb-12 drop-shadow-lg">🏆 TOP 3 🏆</h2>
              {Object.entries(players).sort((a,b)=>b[1].score - a[1].score).slice(0,3).map(([name, p], i) => (
                <div key={name} className={`flex justify-between p-6 rounded-2xl mb-4 text-3xl font-black shadow-lg ${i===0?'bg-amber-300 scale-110':i===1?'bg-slate-300':'bg-orange-300'}`}>
                  <span>{i+1}위 {name}</span>
                  <span>{p.score || 0}pt</span>
                </div>
              ))}
              <button onClick={()=>window.location.reload()} className="mt-10 text-slate-400 font-bold underline">처음으로 돌아가기</button>
            </div>
          )}
        </div>
      );
    }

    // 5. 학생용 (리모컨)
    function StudentView() {
      const [roomCode, setRoomCode] = useState('');
      const [name, setName] = useState('');
      const [isJoined, setIsJoined] = useState(false);
      const [gameData, setGameData] = useState({ state: 'waiting' });
      const [hasAnswered, setHasAnswered] = useState(false);

      const join = () => {
        if(!roomCode || !name) return alert('모두 입력해주세요.');
        db.ref(`rooms/${roomCode}`).on('value', snap => {
          const data = snap.val();
          if(!data) return alert('존재하지 않는 방입니다.');
          setGameData(data);
          setIsJoined(true);
        });
        db.ref(`rooms/${roomCode}/players/${name}`).set({ score: 0, answer: null });
      };

      const sendAnswer = (idx) => {
        if(hasAnswered) return;
        setHasAnswered(true);
        db.ref(`rooms/${roomCode}/players/${name}`).update({
          answer: idx,
          answerTime: Date.now(),
          questionStartTime: gameData.startTime
        });
      };

      useEffect(() => {
        if(gameData.state === 'question') setHasAnswered(false);
      }, [gameData.state, gameData.currentIdx]);

      if(!isJoined) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-amber-400 p-6">
            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
              <h2 className="text-3xl font-black text-center mb-8">입장하기</h2>
              <input type="text" placeholder="방 코드 4자리" maxLength="4" className="w-full p-4 border-4 rounded-2xl mb-4 text-center text-2xl font-bold" value={roomCode} onChange={e=>setRoomCode(e.target.value)} />
              <input type="text" placeholder="닉네임" className="w-full p-4 border-4 rounded-2xl mb-8 text-center text-2xl font-bold" value={name} onChange={e=>setName(e.target.value)} />
              <button onClick={join} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition">도전!</button>
            </div>
          </div>
        );
      }

      // 점수를 불러올 때 에러가 나지 않도록 전통적인 방어 코드(삼항 연산자) 사용
      const currentScore = gameData.players && gameData.players[name] ? gameData.players[name].score : 0;

      return (
        <div className="p-4 min-h-screen flex flex-col bg-slate-100 text-center">
          <div className="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between font-bold text-lg">
            <span>👤 {name}</span>
            <span>⭐ {currentScore}pt</span>
          </div>

          {gameData.state === 'waiting' && <div className="flex-1 flex items-center justify-center text-2xl font-bold text-slate-400 animate-pulse">선생님이 게임을 시작할 때까지<br/>기다려주세요!</div>}
          
          {gameData.state === 'question' && (
            <div className="flex-1 flex flex-col gap-4">
              {hasAnswered ? (
                <div className="flex-1 flex items-center justify-center text-2xl font-bold text-slate-500">답변 제출 완료!<br/>화면을 보세요.</div>
              ) : (
                ['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'].map((color, i) => (
                  <button key={i} onClick={()=>sendAnswer(i)} className={`flex-1 rounded-3xl shadow-xl active:scale-90 transition ${color}`}></button>
                ))
              )}
            </div>
          )}

          {gameData.state === 'result' && <div className="flex-1 flex items-center justify-center text-3xl font-black text-indigo-600 animate-bounce">정답 확인 시간!</div>}
          {gameData.state === 'final' && <div className="flex-1 flex items-center justify-center text-3xl font-black text-amber-500">게임 종료! 고생했어요!</div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
