<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>풍양중 초성퀴즈</title>
    
    <!-- 폰트 설정 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#C5A869',
                            light: '#E6CF91',
                            dark: '#9A7D3C',
                        },
                        bgDark: '#121212'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: white;
            overflow: hidden;
            user-select: none;
        }
        
        .text-gradient-gold {
            background: linear-gradient(to right, #B38728, #FBF5B7, #DAA520);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glow-effect {
            text-shadow: 0 0 20px rgba(197, 168, 105, 0.4);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 퀴즈 데이터 (가장 쉬운 2글자 10라운드)
        const QUIZ_DATA = [
            { chosung: 'ㄱ ㄱ', examples: '가구, 고기, 경기, 공기, 기계, 감기, 광고, 과거, 국기' },
            { chosung: 'ㅅ ㅈ', examples: '사진, 사자, 수저, 사전, 상자, 시장, 소주, 성적, 사장' },
            { chosung: 'ㅇ ㅇ', examples: '우유, 아이, 이유, 언어, 음악, 우연, 영웅, 얼음, 웃음' },
            { chosung: 'ㅂ ㅂ', examples: '바보, 부부, 방법, 비빔, 봄비, 불법, 불빛, 별빛, 비법' },
            { chosung: 'ㅎ ㄱ', examples: '학교, 한글, 합격, 한강, 한국, 휴가, 현관, 향기, 호구' },
            { chosung: 'ㄱ ㅅ', examples: '가수, 가슴, 감사, 간식, 계산, 계속, 공사, 교실, 기사' },
            { chosung: 'ㅅ ㅅ', examples: '사실, 사슴, 생산, 선수, 세상, 소설, 순서, 식사, 상식' },
            { chosung: 'ㅇ ㅈ', examples: '안전, 여자, 오전, 우주, 운전, 의자, 인정, 일정, 이자' },
            { chosung: 'ㅁ ㅈ', examples: '맥주, 매점, 먼지, 먼저, 모자, 모집, 문자, 문제, 면적' },
            { chosung: 'ㄱ ㄹ', examples: '가루, 가로, 거리, 계란, 고래, 구름, 권리, 그림, 기린' }
        ];

        function App() {
            const [gameState, setGameState] = useState('start'); // start, playing, end
            const [currentRound, setCurrentRound] = useState(0);
            const [showExamples, setShowExamples] = useState(false);
            const [timeLeft, setTimeLeft] = useState(30);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            // 타이머 로직
            useEffect(() => {
                let timer = null;
                if (isTimerRunning && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setIsTimerRunning(false);
                }
                return () => clearInterval(timer);
            }, [isTimerRunning, timeLeft]);

            const startGame = () => {
                setGameState('playing');
                setCurrentRound(0);
                resetRound();
            };

            const resetRound = () => {
                setShowExamples(false);
                setTimeLeft(30);
                setIsTimerRunning(false);
            };

            const nextRound = () => {
                if (currentRound < QUIZ_DATA.length - 1) {
                    setCurrentRound(prev => prev + 1);
                    resetRound();
                } else {
                    setGameState('end');
                }
            };

            const prevRound = () => {
                if (currentRound > 0) {
                    setCurrentRound(prev => prev - 1);
                    resetRound();
                }
            };

            // 시작 화면
            if (gameState === 'start') {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center relative">
                        <div className="text-gold tracking-[0.5em] text-xl font-bold mb-6">풍양중 흑백교사전</div>
                        <h1 className="text-7xl md:text-9xl font-black mb-12 text-gradient-gold glow-effect text-center fade-in">
                            초성 퀴즈
                        </h1>
                        <p className="text-gray-400 text-lg mb-12 fade-in" style={{animationDelay: '0.2s'}}>
                            제시된 초성을 보고 연상되는 단어를 외쳐주세요!
                        </p>
                        <button 
                            onClick={startGame}
                            className="px-12 py-4 bg-transparent border-2 border-gold text-gold text-2xl font-bold rounded-full hover:bg-gold hover:text-black transition-all duration-300 fade-in"
                            style={{animationDelay: '0.4s'}}
                        >
                            게임 시작하기
                        </button>
                    </div>
                );
            }

            // 종료 화면
            if (gameState === 'end') {
                return (
                    <div className="h-screen w-full flex flex-col items-center justify-center">
                        <h1 className="text-6xl md:text-8xl font-black mb-8 text-gradient-gold glow-effect text-center fade-in">
                            수고하셨습니다!
                        </h1>
                        <p className="text-gray-300 text-2xl mb-12 fade-in">모든 라운드가 종료되었습니다.</p>
                        <button 
                            onClick={() => setGameState('start')}
                            className="px-8 py-3 bg-gray-800 border border-gray-600 text-white text-lg rounded hover:bg-gray-700 transition-all duration-300 fade-in"
                        >
                            처음으로 돌아가기
                        </button>
                    </div>
                );
            }

            // 게임 진행 화면
            const currentData = QUIZ_DATA[currentRound];

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center relative p-6">
                    
                    {/* 상단 정보 (라운드 및 타이머) */}
                    <div className="absolute top-10 w-full flex justify-between items-center px-10 md:px-20">
                        <div className="px-6 py-2 rounded-full border border-gold/40 bg-black/50 text-gold font-bold text-2xl tracking-widest shadow-[0_0_15px_rgba(197,168,105,0.2)]">
                            ROUND {currentRound + 1} <span className="text-gray-500 text-lg ml-2">/ {QUIZ_DATA.length}</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className={`text-4xl font-bold font-mono ${timeLeft <= 5 ? 'text-red-500' : 'text-white'}`}>
                                00:{timeLeft < 10 ? `0${timeLeft}` : timeLeft}
                            </div>
                            <button 
                                onClick={() => setIsTimerRunning(!isTimerRunning)}
                                className="w-12 h-12 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center text-gold transition border border-gray-600"
                            >
                                {isTimerRunning ? '⏸' : '▶'}
                            </button>
                        </div>
                    </div>

                    {/* 메인 초성 표시 */}
                    <div className="flex-1 flex flex-col items-center justify-center w-full fade-in">
                        <div className="text-[12rem] md:text-[18rem] font-black leading-none text-white tracking-[0.2em] ml-[0.2em] glow-effect drop-shadow-2xl">
                            {currentData.chosung}
                        </div>

                        {/* 예시 정답 표시 영역 (진행자용) */}
                        <div className="h-32 mt-12 flex items-center justify-center">
                            {showExamples ? (
                                <div className="text-gray-300 text-2xl md:text-3xl font-medium tracking-wide text-center leading-relaxed fade-in bg-white/5 px-8 py-4 rounded-xl border border-white/10">
                                    <span className="text-gold mr-3">예시:</span> {currentData.examples}
                                </div>
                            ) : (
                                <button 
                                    onClick={() => setShowExamples(true)}
                                    className="px-6 py-2 text-gray-500 border border-gray-700 rounded hover:bg-gray-800 hover:text-gray-300 transition"
                                >
                                    예시 정답 보기 (진행자용)
                                </button>
                            )}
                        </div>
                    </div>

                    {/* 하단 컨트롤 (이전/다음 라운드) */}
                    <div className="absolute bottom-10 flex gap-6">
                        <button 
                            onClick={prevRound}
                            disabled={currentRound === 0}
                            className={`px-8 py-3 rounded text-lg font-bold transition-all ${currentRound === 0 ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-gray-800 text-white hover:bg-gray-700 border border-gray-600'}`}
                        >
                            이전 라운드
                        </button>
                        <button 
                            onClick={nextRound}
                            className="px-8 py-3 bg-gold text-black rounded text-lg font-bold hover:bg-gold-light transition-all shadow-[0_0_15px_rgba(197,168,105,0.4)]"
                        >
                            {currentRound === QUIZ_DATA.length - 1 ? '결과 보기' : '다음 라운드'}
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
