<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe-hoot | 반별 퀴즈 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap');
    body { font-family: 'Nanum+Gothic', sans-serif; }
    .title-font { font-family: 'Black Han Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Firebase 초기화 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDVk0xKbUykia3dpmP0PMMxoVExRgPOo-o",
      authDomain: "test-dafb1.firebaseapp.com",
      databaseURL: "https://test-dafb1.firebaseio.com",
      projectId: "test-dafb1",
      storageBucket: "test-dafb1.firebasestorage.app",
      messagingSenderId: "842762232815",
      appId: "1:842762232815:web:a4bcfac346712ef2250c1a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const ADMIN_PASSWORD = "vnddidwnd";

    function App() {
      const [view, setView] = useState('home'); // home, admin_auth, admin_classes, admin_class_detail, game_host, student
      const [selectedClassName, setSelectedClassName] = useState(null); // 선택된 반 이름 (예: 1학년 7반)
      const [activeRoomCode, setActiveRoomCode] = useState(null); // 발급된 4자리 룸 코드
      
      return (
        <div className="min-h-screen">
          {view === 'home' && <HomeView onSelect={setView} />}
          {view === 'admin_auth' && <AdminAuth onSuccess={() => setView('admin_classes')} />}
          
          {/* 반 목록 관리 */}
          {view === 'admin_classes' && (
            <AdminClassesView 
              onSelectClass={(className) => {
                setSelectedClassName(className);
                setView('admin_class_detail');
              }} 
            />
          )}

          {/* 특정 반 내부 (문제 출제 및 방 열기) */}
          {view === 'admin_class_detail' && (
            <AdminClassDetailView 
              className={selectedClassName} 
              onBack={() => setView('admin_classes')}
              onStartSession={(code) => {
                setActiveRoomCode(code);
                setView('game_host');
              }}
            />
          )}

          {/* 실시간 게임 호스트 화면 */}
          {view === 'game_host' && (
            <GameHostView 
              roomCode={activeRoomCode} 
              onBack={() => setView('admin_classes')} 
            />
          )}

          {/* 학생용 화면 */}
          {view === 'student' && <StudentView onBack={() => setView('home')} />}
        </div>
      );
    }

    // ==========================================
    // 1. 메인 화면
    // ==========================================
    function HomeView({ onSelect }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-700 text-white p-6">
          <h1 className="text-6xl title-font mb-12 drop-shadow-2xl">Vibe-hoot! 🚀</h1>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            <button onClick={() => onSelect('student')} className="p-8 bg-amber-400 text-amber-900 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition">학생 입장하기</button>
            <button onClick={() => onSelect('admin_auth')} className="p-8 bg-white text-indigo-700 rounded-3xl text-3xl font-black shadow-xl hover:scale-105 transition">선생님 관리자</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 관리자 인증
    // ==========================================
    function AdminAuth({ onSuccess }) {
      const [pw, setPw] = useState('');
      const handleLogin = () => {
        if (pw === ADMIN_PASSWORD) onSuccess();
        else alert('비밀번호가 틀렸습니다.');
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-slate-800 p-6">
          <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
            <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">선생님 로그인</h2>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} className="w-full p-4 border-2 rounded-xl mb-4 text-center text-xl" placeholder="비밀번호 입력" />
            <button onClick={handleLogin} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-xl">입장</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3-A. 관리자: 반 목록 (반 개설)
    // ==========================================
    function AdminClassesView({ onSelectClass }) {
      const [classes, setClasses] = useState([]);
      const [newClassName, setNewClassName] = useState('');

      useEffect(() => {
        db.ref('school_classes').on('value', snap => {
          const data = snap.val() || {};
          setClasses(Object.keys(data)); // 반 이름들만 배열로
        });
      }, []);

      const createClass = () => {
        if(!newClassName.trim()) return alert('반 이름을 입력하세요! (예: 1학년 7반)');
        db.ref('school_classes/' + newClassName).set({
          createdAt: Date.now()
        }).then(() => {
          setNewClassName('');
        }).catch(e => alert('DB 저장 에러: ' + e.message));
      };

      const deleteClass = (name) => {
        if(confirm(`[${name}] 반을 삭제하시겠습니까? (저장된 문제도 날아갑니다)`)) {
          db.ref('school_classes/' + name).remove();
        }
      };

      return (
        <div className="p-8 max-w-4xl mx-auto">
          <h2 className="text-4xl title-font text-indigo-700 mb-8">내 클래스 관리</h2>
          
          <div className="bg-white p-6 rounded-2xl shadow-md mb-8 flex gap-4">
            <input 
              type="text" placeholder="새로운 반 이름 입력 (예: 1학년 7반)" 
              className="flex-1 p-4 border-2 rounded-xl font-bold text-xl"
              value={newClassName} onChange={e => setNewClassName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && createClass()}
            />
            <button onClick={createClass} className="px-8 bg-green-500 text-white font-bold text-xl rounded-xl hover:bg-green-600">반 개설</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {classes.length === 0 && <div className="text-slate-500">개설된 반이 없습니다. 먼저 반을 만드세요.</div>}
            {classes.map(name => (
              <div key={name} className="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-100 flex justify-between items-center shadow-sm">
                <span className="text-2xl font-black text-slate-800">{name}</span>
                <div className="flex gap-2">
                  <button onClick={() => onSelectClass(name)} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">문제 관리</button>
                  <button onClick={() => deleteClass(name)} className="px-4 py-2 bg-red-100 text-red-600 font-bold rounded-lg hover:bg-red-200">삭제</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // 3-B. 관리자: 특정 반 내부 (문제 등록 및 세션 열기)
    // ==========================================
    function AdminClassDetailView({ className, onBack, onStartSession }) {
      const [questions, setQuestions] = useState([]);
      const [newQ, setNewQ] = useState({ question: '', options: ['', '', '', ''], answerIndex: 0 });

      useEffect(() => {
        db.ref(`school_classes/${className}/questions`).on('value', snap => {
          const data = snap.val();
          if(data) setQuestions(Object.entries(data).map(([id, val]) => ({id, ...val})));
          else setQuestions([]);
        });
      }, [className]);

      const saveQuestion = () => {
        if(!newQ.question) return alert('문제를 입력하세요');
        db.ref(`school_classes/${className}/questions`).push(newQ)
          .then(() => setNewQ({ question: '', options: ['', '', '', ''], answerIndex: 0 }))
          .catch(e => alert('저장 실패: ' + e.message));
      };

      const deleteQuestion = (id) => db.ref(`school_classes/${className}/questions/${id}`).remove();

      // 핵심 로직: 입장 시작하기 (4자리 세션 코드 발급)
      const openSession = () => {
        if(questions.length === 0) return alert('문제가 하나도 없습니다! 먼저 문제를 만들어주세요.');
        
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        
        // active_sessions에 새 방 정보 기록
        db.ref('active_sessions/' + code).set({
          targetClass: className,
          state: 'waiting',
          isLocked: false,
          currentIdx: 0,
          quizList: questions,
          players: {}
        }).then(() => {
          onStartSession(code);
        }).catch(e => alert('방 생성 실패: ' + e.message));
      };

      return (
        <div className="p-8 max-w-5xl mx-auto">
          <div className="flex justify-between items-center mb-8 border-b-4 border-indigo-100 pb-6">
            <div className="flex items-center gap-4">
              <button onClick={onBack} className="px-4 py-2 bg-slate-200 rounded-lg font-bold">← 뒤로</button>
              <h2 className="text-4xl title-font text-indigo-700">{className} 문제함</h2>
            </div>
            {/* 이 버튼을 누르면 4자리 코드가 발급되며 대기실로 이동 */}
            <button onClick={openSession} className="px-8 py-4 bg-amber-500 text-white rounded-2xl font-black text-2xl shadow-xl hover:bg-amber-600 transition animate-bounce">
              🚀 입장 시작하기 (방 열기)
            </button>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            {/* 왼쪽: 새 문제 만들기 */}
            <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-md h-fit">
              <h3 className="text-xl font-bold mb-4">새 문제 추가</h3>
              <input type="text" placeholder="질문을 입력하세요" className="w-full p-3 border-2 rounded-lg mb-4 font-bold" value={newQ.question} onChange={e=>setNewQ({...newQ, question:e.target.value})} />
              <div className="space-y-2 mb-6">
                {newQ.options.map((opt, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input type="radio" name="ans" checked={newQ.answerIndex === i} onChange={()=>setNewQ({...newQ, answerIndex:i})} className="w-5 h-5 accent-indigo-500" />
                    <input type="text" placeholder={`선택지 ${i+1}`} className="flex-1 p-2 border rounded" value={opt} onChange={e=>{
                      const copy = [...newQ.options];
                      copy[i] = e.target.value;
                      setNewQ({...newQ, options: copy});
                    }} />
                  </div>
                ))}
              </div>
              <button onClick={saveQuestion} className="w-full py-3 bg-indigo-500 text-white rounded-xl font-bold hover:bg-indigo-600">이 반에 문제 저장</button>
            </div>

            {/* 오른쪽: 저장된 문제 리스트 */}
            <div className="lg:col-span-2 space-y-3">
              <h3 className="text-xl font-bold mb-4">현재 저장된 문제 ({questions.length}개)</h3>
              {questions.length === 0 && <div className="p-8 text-center text-slate-400 bg-slate-100 rounded-2xl">저장된 문제가 없습니다.</div>}
              {questions.map((q, idx) => (
                <div key={q.id} className="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border-l-8 border-indigo-400">
                  <div className="flex-1">
                    <p className="font-bold text-lg"><span className="text-indigo-500 mr-2">Q{idx+1}.</span>{q.question}</p>
                    <p className="text-sm text-green-600 mt-1">정답: {q.options[q.answerIndex]}</p>
                  </div>
                  <button onClick={()=>deleteQuestion(q.id)} className="text-red-500 font-bold bg-slate-50 px-4 py-2 rounded shadow-sm">삭제</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. 게임 호스트 (선생님 진행 화면)
    // ==========================================
    function GameHostView({ roomCode, onBack }) {
      const [roomData, setRoomData] = useState(null);
      const [timeLeft, setTimeLeft] = useState(30);

      useEffect(() => {
        const ref = db.ref('active_sessions/' + roomCode);
        ref.on('value', snap => setRoomData(snap.val()));
        return () => ref.off();
      }, [roomCode]);

      useEffect(() => {
        let timer;
        if (roomData && roomData.state === 'question' && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (roomData && roomData.state === 'question' && timeLeft === 0) {
          showResult();
        }
        return () => clearInterval(timer);
      }, [roomData ? roomData.state : null, timeLeft]);

      if(!roomData) return <div className="p-20 text-center text-2xl font-bold">방 정보를 불러오는 중...</div>;

      const toggleLock = () => {
        db.ref('active_sessions/' + roomCode).update({ isLocked: !roomData.isLocked });
      };

      const startGame = () => {
        db.ref('active_sessions/' + roomCode).update({ state: 'question', startTime: Date.now(), isLocked: true });
      };

      const showResult = () => {
        const currentQ = roomData.quizList[roomData.currentIdx];
        const updates = {};
        updates['active_sessions/' + roomCode + '/state'] = 'result';
        
        if(roomData.players) {
          Object.entries(roomData.players).forEach(([name, p]) => {
            if (p.answer === currentQ.answerIndex && p.answerTime) {
              const timeTaken = (p.answerTime - p.questionStartTime) / 1000;
              const scoreAdd = Math.max(0, Math.round((1 - timeTaken / 30) * 1000));
              updates['active_sessions/' + roomCode + '/players/' + name + '/score'] = (p.score || 0) + scoreAdd;
            }
            updates['active_sessions/' + roomCode + '/players/' + name + '/answer'] = null;
          });
        }
        db.ref().update(updates);
      };

      const nextQuestion = () => {
        if(roomData.currentIdx + 1 < roomData.quizList.length) {
          setTimeLeft(30);
          db.ref('active_sessions/' + roomCode).update({ state: 'question', currentIdx: roomData.currentIdx + 1, startTime: Date.now() });
        } else {
          db.ref('active_sessions/' + roomCode).update({ state: 'final' });
        }
      };

      const closeSession = () => {
        if(confirm('게임을 완전히 종료하고 대기실로 돌아가시겠습니까?')) {
          db.ref('active_sessions/' + roomCode).remove(); // 세션 파기
          onBack();
        }
      };

      const playersList = roomData.players ? Object.keys(roomData.players) : [];

      return (
        <div className="p-8 text-center min-h-screen bg-slate-100 relative">
          <button onClick={closeSession} className="absolute top-8 left-8 px-4 py-2 bg-red-500 text-white rounded font-bold shadow">방폭파/종료</button>
          
          {roomData.state === 'waiting' && (
            <div className="mt-10">
              <h2 className="text-3xl mb-4 font-bold text-slate-600">[{roomData.targetClass}] 학생들, 아래 코드로 입장하세요!</h2>
              <div className="text-9xl title-font text-indigo-600 mb-8 drop-shadow-xl">{roomCode}</div>
              
              <div className="mb-10">
                <button onClick={toggleLock} className={`px-8 py-4 rounded-full text-xl font-bold shadow-md transition ${roomData.isLocked ? 'bg-red-500 text-white' : 'bg-white text-indigo-700 border-2 border-indigo-200'}`}>
                  {roomData.isLocked ? '🔒 현재 입장 불가능 (잠김)' : '🔓 입장 허용 중 (여기를 눌러 잠금)'}
                </button>
              </div>

              <div className="bg-white rounded-3xl p-8 shadow-xl max-w-4xl mx-auto border-t-8 border-indigo-500">
                <h3 className="text-2xl font-bold mb-6">현재 접속 명단 ({playersList.length}명)</h3>
                <div className="flex flex-wrap gap-4 justify-center min-h-[100px]">
                  {playersList.length === 0 && <span className="text-gray-400 mt-4">입장을 기다리고 있습니다...</span>}
                  {playersList.map(name => <span key={name} className="px-6 py-3 bg-indigo-100 rounded-full font-bold text-xl text-indigo-800 shadow-sm">{name}</span>)}
                </div>
                <button onClick={startGame} className="mt-12 px-20 py-5 bg-indigo-600 text-white rounded-2xl text-3xl font-black shadow-lg hover:bg-indigo-700">문제 풀이 시작!</button>
              </div>
            </div>
          )}

          {roomData.state === 'question' && (
            <div className="max-w-5xl mx-auto mt-10">
              <div className="flex justify-between items-center mb-8">
                <span className="text-5xl font-black text-red-500 bg-white px-8 py-4 rounded-full shadow-lg">{timeLeft}초</span>
                <span className="text-3xl font-bold bg-indigo-200 px-6 py-2 rounded-full text-indigo-800">Q {roomData.currentIdx + 1}</span>
              </div>
              <h2 className="text-5xl font-black bg-white p-12 rounded-3xl shadow-xl mb-10">{roomData.quizList[roomData.currentIdx].question}</h2>
              <div className="grid grid-cols-2 gap-6 h-64">
                {roomData.quizList[roomData.currentIdx].options.map((opt, i) => (
                  <div key={i} className={`flex items-center justify-center text-4xl font-bold text-white rounded-2xl shadow-xl ${['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'][i]}`}>
                    {opt}
                  </div>
                ))}
              </div>
              <button onClick={showResult} className="mt-8 px-6 py-3 bg-slate-800 text-white rounded-xl font-bold">강제 스킵</button>
            </div>
          )}

          {roomData.state === 'result' && (
            <div className="mt-20">
              <h2 className="text-4xl font-bold mb-6 text-slate-600">정답!</h2>
              <div className="text-7xl font-black text-green-600 mb-16 bg-white inline-block px-12 py-6 rounded-3xl shadow-xl">
                {roomData.quizList[roomData.currentIdx].options[roomData.quizList[roomData.currentIdx].answerIndex]}
              </div>
              <div>
                <button onClick={nextQuestion} className="px-16 py-6 bg-indigo-600 text-white rounded-full text-3xl font-bold shadow-xl">
                  {roomData.currentIdx + 1 < roomData.quizList.length ? '다음 문제' : '최종 결과 확인'}
                </button>
              </div>
            </div>
          )}

          {roomData.state === 'final' && (
            <div className="max-w-3xl mx-auto mt-16">
              <h2 className="text-6xl title-font text-amber-500 mb-10">최종 순위표</h2>
              <div className="space-y-4">
                {playersList.length > 0 ? (
                  Object.entries(roomData.players)
                    .sort((a,b)=> (b[1].score||0) - (a[1].score||0))
                    .map(([name, p], i) => (
                      <div key={name} className={`flex justify-between items-center p-6 rounded-2xl text-3xl font-black shadow ${i===0?'bg-amber-300 scale-105 z-10':i===1?'bg-slate-300':i===2?'bg-orange-300':'bg-white'}`}>
                        <span>{i+1}등 {name}</span>
                        <span>{p.score || 0} pt</span>
                      </div>
                    ))
                ) : (
                  <div className="text-3xl font-bold text-gray-500">참여자가 없습니다.</div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. 학생용 화면 (입장 및 리모컨)
    // ==========================================
    function StudentView({ onBack }) {
      const [roomCode, setRoomCode] = useState('');
      const [name, setName] = useState('');
      const [isJoined, setIsJoined] = useState(false);
      const [gameData, setGameData] = useState({ state: 'waiting' });
      const [hasAnswered, setHasAnswered] = useState(false);

      const join = async () => {
        if(!roomCode || !name) return alert('클래스 코드와 닉네임을 모두 입력해주세요!');
        
        try {
          // 1. active_sessions 에서 해당 코드가 있는지 검사
          const snap = await db.ref('active_sessions/' + roomCode).once('value');
          const data = snap.val();
          
          if(!data) {
            return alert('존재하지 않는 코드입니다! 선생님 화면에 뜬 4자리 코드를 확인하세요.');
          }
          if(data.isLocked) {
            return alert('입장이 마감된 방입니다! 선생님께 문을 열어달라고 말씀하세요.');
          }

          // 2. 플레이어 명단에 추가
          await db.ref('active_sessions/' + roomCode + '/players/' + name).set({ score: 0, answer: null });
          
          setIsJoined(true);
          
          // 3. 실시간 리스너 연동
          db.ref('active_sessions/' + roomCode).on('value', snap2 => {
            const liveData = snap2.val();
            // 선생님이 방을 닫았을 때 처리
            if(!liveData) {
              alert('선생님이 방을 종료했습니다.');
              setIsJoined(false);
            } else {
              setGameData(liveData);
            }
          });

        } catch (error) {
          alert('서버 오류로 입장하지 못했습니다. (네트워크나 권한 설정을 확인하세요): ' + error.message);
          console.error(error);
        }
      };

      const sendAnswer = (idx) => {
        if(hasAnswered) return;
        setHasAnswered(true);
        db.ref('active_sessions/' + roomCode + '/players/' + name).update({
          answer: idx,
          answerTime: Date.now(),
          questionStartTime: gameData.startTime
        });
      };

      useEffect(() => {
        if(gameData.state === 'question') setHasAnswered(false);
      }, [gameData.state, gameData.currentIdx]);

      if(!isJoined) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-indigo-500 p-6 relative">
            <button onClick={onBack} className="absolute top-8 left-8 px-4 py-2 bg-indigo-600 text-white rounded font-bold shadow">← 처음으로</button>
            <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-sm">
              <h2 className="text-4xl font-black text-center mb-10 text-slate-800">게임 입장</h2>
              <input type="text" placeholder="선생님이 알려준 4자리 코드" maxLength="4" className="w-full p-5 border-4 border-slate-200 rounded-2xl mb-4 text-center text-xl font-bold focus:border-indigo-500 outline-none" value={roomCode} onChange={e=>setRoomCode(e.target.value)} />
              <input type="text" placeholder="내 이름 (예: 홍길동)" className="w-full p-5 border-4 border-slate-200 rounded-2xl mb-10 text-center text-xl font-bold focus:border-indigo-500 outline-none" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&join()} />
              <button onClick={join} className="w-full py-6 bg-amber-400 text-amber-900 rounded-2xl font-black text-3xl shadow-[0_8px_0_#d97706] active:translate-y-2 active:shadow-none transition-all">도전!</button>
            </div>
          </div>
        );
      }

      const currentScore = gameData.players && gameData.players[name] ? gameData.players[name].score : 0;

      return (
        <div className="p-4 min-h-screen flex flex-col bg-slate-100 text-center">
          <div className="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border-b-4 border-indigo-200">
            <span className="font-black text-xl text-slate-700">👤 {name}</span>
            <span className="font-black text-2xl text-amber-500">⭐ {currentScore} pt</span>
          </div>

          {gameData.state === 'waiting' && (
            <div className="flex-1 flex flex-col items-center justify-center">
              <div className="text-3xl font-black text-slate-500 leading-relaxed">준비 완료!<br/>선생님이 게임을 시작할 때까지<br/>대기하세요.</div>
            </div>
          )}
          
          {gameData.state === 'question' && (
            <div className="flex-1 flex flex-col gap-4">
              {hasAnswered ? (
                <div className="flex-1 flex flex-col items-center justify-center bg-slate-200 rounded-3xl">
                  <div className="text-3xl font-black text-slate-600">제출 완료!<br/>앞 화면을 보세요.</div>
                </div>
              ) : (
                ['bg-red-500','bg-blue-500','bg-amber-400','bg-emerald-500'].map((color, i) => (
                  <button key={i} onClick={()=>sendAnswer(i)} className={`flex-1 rounded-[2rem] shadow-[0_10px_0_rgba(0,0,0,0.2)] active:translate-y-2 active:shadow-none transition-all ${color}`}></button>
                ))
              )}
            </div>
          )}

          {gameData.state === 'result' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-indigo-100 rounded-3xl">
              <div className="text-4xl font-black text-indigo-700">앞 화면에서<br/>정답을 확인하세요!</div>
            </div>
          )}
          
          {gameData.state === 'final' && (
            <div className="flex-1 flex flex-col items-center justify-center bg-amber-100 rounded-3xl">
              <div className="text-5xl font-black text-amber-600 mb-4">게임 종료!</div>
              <div className="text-2xl font-bold text-slate-600">내 최종 점수: {currentScore}점</div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
